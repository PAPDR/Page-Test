  //Gets a random value in an array
  function getRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function generate() {
    const roll = Math.random(); // 0 to 1
    let firstPart;

    //Choses character or player names randomly
    if (roll < .1){
      firstPart = getRandom(people_names);
    }else{
      firstPart = getRandom(character_names);
    }
    console.log(firstPart);

    const secondPart = getRandom(strings);

    //Adds both parts together
    const result = firstPart + " " + secondPart;


    //Animation----
    const output = document.getElementById("output");
    let spins = 20;
    let delay = 50;

    let spinInterval = setInterval(() => {
      const tempFirst = getRandom(fake_names);
      const tempSecond = getRandom(strings);

      output.textContent = tempFirst + " " + tempSecond;

      spins--;

      if (spins <= 0) {
        clearInterval(spinInterval);
        output.textContent = result;  
      }
    }, delay);

    //Puts the value into the html document
    document.getElementById("output").textContent = result;

    //Changes background color
    document.body.style.backgroundColor = getRandom(colors);
  }
