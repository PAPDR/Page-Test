<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f4f4f4;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }

    #output {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>String Generator</h2>
  <button onclick="generate()">Generate</button>
  <div id="output"></div>
</div>

<script>
  const character_names = [
    "Slaizen",
    "Gor",
    "Ellison",
    "Ignacius",
    "An unnamed goblin"
  ]

  const people_names = [
    "Pedro",
    "Alejandro",
    "Vazquez",
    "AJ",
    "Dave",
    "John",
    "Bernard"
  ]

  const strings = [
    " exploded.",
    " got treasure.",
    " ate a forbidden fruit.",
    " lost both arms.",
    " won't forget this.",
    " got lost to the sands of time."

  ];

  //Gets a random value in an array
  function getRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function generate() {
    const roll = Math.random(); // 0 to 1
    let firstPart;

    //Choses character or player names randomly
    if (roll < .2){
      firstPart = getRandom(people_names);
    }else{
      firstPart = getRandom(character_names)
    }

    const secondPart = getRandom(strings)

    //Adds both parts together
    const result = firstPart + " " + secondPart;
    //Puts the value into the html document
    document.getElementById("output").textContent = strings[result];
  }
</script>

</body>
</html>
